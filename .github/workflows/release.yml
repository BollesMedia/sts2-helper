name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Sync version from git tag
        shell: bash
        run: |
          # Strip 'v' prefix: v0.11.0 → 0.11.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"

          # tauri.conf.json (Tauri binary version — used by auto-updater)
          cd apps/desktop/src-tauri
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf-8'));
            conf.version = '$VERSION';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          cd ../../..

          # package.json
          cd apps/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ../..

          # Sentry release tag
          sed -i.bak "s/sts2-replay@[0-9.]*/sts2-replay@$VERSION/" apps/desktop/src/main.tsx && rm -f apps/desktop/src/main.tsx.bak

          # Error reporter version
          sed -i.bak "s/const APP_VERSION = \"[0-9.]*\"/const APP_VERSION = \"$VERSION\"/" packages/shared/lib/error-reporter.ts && rm -f packages/shared/lib/error-reporter.ts.bak

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # VITE_* env vars are in apps/desktop/.env.production (committed, publishable values)
          # Do NOT duplicate them here — .env.production is the single source of truth
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'STS2 Replay ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
