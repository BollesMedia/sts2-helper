name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pinning macos-14 (Sonoma). macos-latest shifted to macos-15 which
          # has hdiutil / AppleScript quirks that intermittently fail
          # bundle_dmg.sh during Tauri's DMG bundling step (0.14 CI regression).
          - platform: macos-14
            args: --target universal-apple-darwin --verbose
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Sync version from git tag
        run: npx tsx scripts/sync-version.ts ${{ github.ref_name }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # VITE_* env vars are in apps/desktop/.env.production (committed, publishable values)
          # Do NOT duplicate them here — .env.production is the single source of truth
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'STS2 Replay ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Retry once on transient macOS DMG bundling failures (AppleScript /
      # hdiutil timeouts in bundle_dmg.sh). The tauri-action is idempotent on
      # release creation — it finds the existing tag and uploads missing
      # artifacts.
      - name: Build Tauri (retry)
        if: steps.tauri-build.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'STS2 Replay ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
